<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>模拟停车场出入场系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container">
    <h1>模拟停车场出入场系统</h1>
    <p class="subtitle">手机拍照或从相册选择车牌图片，上传到服务器后完成 OCR 识别和出入场处理。</p>

    <div class="card">
      <div class="field-group">
        <label>操作类型</label>
        <div class="radio-group">
          <label><input type="radio" name="action" value="entry" checked /> 入场</label>
          <label><input type="radio" name="action" value="exit" /> 出场</label>
        </div>
      </div>

      <div class="field-group">
        <label>选择车牌图片</label>
        <div class="picker-actions">
          <button id="cameraBtn" type="button" class="secondary-btn">拍照识别</button>
          <button id="galleryBtn" type="button" class="secondary-btn">从相册选择</button>
        </div>
        <input id="cameraInput" class="hidden-input" type="file" accept="image/*" capture="environment" />
        <input id="galleryInput" class="hidden-input" type="file" accept="image/*" />
        <p id="selectedFileText" class="helper-text">当前未选择图片</p>
      </div>

      <div class="preview-wrapper">
        <img id="previewImage" class="preview hidden" alt="车牌图片预览" />
      </div>

      <button id="uploadBtn" type="button">上传并识别</button>
      <p id="statusText" class="status"></p>
    </div>

    <div class="card result-card">
      <h2>识别结果</h2>
      <div id="resultBox" class="result-box empty">暂无结果</div>
    </div>

    <div class="card result-card">
      <div class="records-header">
        <h2>最近停车记录</h2>
        <button id="refreshRecordsBtn" type="button" class="secondary-btn small-btn">刷新记录</button>
      </div>
      <div id="recordsBox" class="result-box empty">正在加载记录...</div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
